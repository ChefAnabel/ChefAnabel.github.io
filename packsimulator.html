<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CardGamesCollectedCards</title>
    <link rel="stylesheet" href="./sidedata/cardcollection.css">
    <script src="https://unpkg.com/i18next@23/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
</head>
<body class="pack-bg" id="background">
    <div class="pack-app">
        <h1 class="pack-title">Pack Opener</h1>

        <div class="pack-controls">
            <select name="packselection" id="packselection">
                <option value="m20pack.json">--Please choose a Pack--</option>
                <optgroup label="MTG">
                    <option value="./sidedata/Final_Fantasy.json">Final Fantasy Play Booster</option>
                </optgroup>
                <optgroup label="ZCG(Event)">
                    <option value="./sidedata/derletztetanzzcg.json">Der letzte Tanz</option>
                </optgroup>
            </select>
            <button id="ZCGPackSimulatorback" onclick="backtomainmenu()">🌸 Back</button>
            <select name="backgroundselection" id="backgroundselection">
                <option value="galaxy">Galaxy</option>
                <option value="ayaka">Ayaka</option>
            </select>
        </div>

        <button id="openpackbutton" onclick="openpack()">
            <img id="packimage" src="./sidedata/cardimages/assetssim/packs/m20pack.png" alt="Open Pack">
            <span class="open-label">May you have the best of Luck! To an explosive pack...</span>
        </button>
    </div>

    <script src="./sidedata/mtgcards.js"></script>
</body>
<style>
    .text
    {
        color: black;
        font-size: 15px;
        background-color: rgba(255, 255, 255, 0.40);
    }
</style>
</html>
